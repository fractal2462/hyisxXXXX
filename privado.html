<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
</head>
<body>

<h2>Chat 💬</h2>
<button onclick="abrir('info')">📁 Información</button>
<button onclick="abrir('notas')">📁 Notas</button>
<button onclick="abrir('chat')">💬 Chat</button>
  <div id="info" style="display:none;">
  <h3>Información</h3>
  <textarea id="textoInfo"></textarea>
  <button onclick="guardarInfo()">Guardar</button>
</div>

<div id="notas" style="display:none;">
  <h3>Notas</h3>
  <textarea id="textoNotas"></textarea>
  <button onclick="guardarNotas()">Guardar</button>
</div>
<div id="chat"></div>

<input type="text" id="mensaje" placeholder="Escribe algo">
<button onclick="enviar()">Enviar</button>

<br><br>
<button onclick="logout()">Cerrar sesión</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVR8vCGuKYjUR-9v_x80fNY5bPewMaxKU",
  authDomain: "hyisx-b4490.firebaseapp.com",
  projectId: "hyisx-b4490",
  storageBucket: "hyisx-b4490.firebasestorage.app",
  messagingSenderId: "960225169942",
  appId: "1:960225169942:web:f93314f0227420c75b5b37"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let usuarioActual = null;

// verificar login
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    usuarioActual = user.email;
    cargarInfo();
  }
});

// escuchar mensajes en tiempo real
import { query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const q = query(
  collection(db, "mensajes"),
  orderBy("fecha", "asc")
);

onSnapshot(q, (snapshot) => {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  snapshot.forEach((doc) => {
    const data = doc.data();
   if (data.texto && data.texto.includes("http")) {
  chat.innerHTML += `
    <p><b>${data.usuario}:</b></p>
    <img src="${data.texto.trim()}" style="max-width:200px;">
  `;
} else {
  chat.innerHTML += `
    <p><b>${data.usuario}:</b> ${data.texto}</p>
  `;
}
  });

  // 🔥 bajar automáticamente
  chat.scrollTop = chat.scrollHeight;
});

// enviar mensaje
window.enviar = async function() {
  const texto = document.getElementById("mensaje").value;

  if (texto === "") return;

  await addDoc(collection(db, "mensajes"), {
  usuario: usuarioActual,
  texto: texto,
  fecha: Date.now()
});
  document.getElementById("mensaje").value = "";
}

// cerrar sesión
window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
}
</script window.abrir = function(seccion) {
  document.getElementById("info").style.display = "none";
  document.getElementById("notas").style.display = "none";
  document.getElementById("chat").style.display = "none";

  document.getElementById(seccion).style.display = "block";
}window.guardarInfo = async function() {
  const texto = document.getElementById("textoInfo").value;

  await setDoc(doc(db, "documentos", "info"), {
    contenido: texto
  });
} async function cargarInfo() {
  const docRef = doc(db, "documentos", "info");
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    document.getElementById("textoInfo").value = docSnap.data().contenido;
  }
} >

</body>
</html>
