<!DOCTYPE html>
<html>
<head>
  <title>Panel</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background: #f2f2f2;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 20px;
      border: none;
      background: #ff4d4d;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #e60000;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>Bienvenido 🔐</h1>
  <p id="correo"></p>
  <button onclick="logout()">Cerrar sesión</button>
</div>

<script type="module">
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const auth = getAuth();

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    document.getElementById("correo").innerText = "Sesión iniciada como: " + user.email;
  }
});

window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
}
</script>

</body>
</html>
